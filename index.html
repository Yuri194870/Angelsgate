<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <title> Wind Monitor AGXC1</title>
    
    <!-- Bibliotheken -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>
    <!-- Plugin voor inzoomen -->
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { margin: 0; color: #1a73e8; font-size: 1.5rem; }

        .upload-section { background: #f8fbff; border: 2px dashed #1a73e8; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px; transition: 0.3s; }
        .upload-section:hover { background: #edf4fe; }

        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 5px; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 5px; }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; display: none; }
        .stat-card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-card .value { font-size: 1.4rem; font-weight: bold; color: #1a73e8; }
        .stat-card .label { font-size: 0.8rem; color: #777; text-transform: uppercase; }

        .chart-container { position: relative; height: 40vh; width: 100%; }
        .chart-container-dir { position: relative; height: 18vh; width: 100%; margin-top: 8px; }
        .hint { font-size: 0.75rem; color: #999; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>AGXC1 Wind Monitor - Angel's Gate</h1>
        <div style="text-align: right;">
            <button id="refreshBtn" style="background:#1a73e8; color:white; border:none; padding:6px 14px; border-radius:6px; font-weight:bold; cursor:pointer;">↻ Ververs</button>
            <div id="file-status" style="font-size: 0.75rem; color: #777; margin-top: 4px;"></div>
        </div>
    </div>

    <div class="upload-section" id="upload-box">
        <strong id="loading-text">Live data laden van NOAA...</strong>
        <div id="error-box" style="display:none; color:#c0392b; margin-top:10px; font-size:0.85rem;"></div>
    </div>

    <div class="dashboard" id="dashboard">
        <div class="stat-card">
            <div class="label">Max Wind (Kts)</div>
            <div id="stat-max" class="value">-</div>
        </div>
        <div class="stat-card">
            <div class="label">Gemiddeld (Kts)</div>
            <div id="stat-avg" class="value">-</div>
        </div>
        <div class="stat-card">
            <div class="label">Tijdzone</div>
            <div class="value" style="font-size: 1rem;">Los Angeles (PST/PDT)</div>
        </div>
    </div>

    <div class="controls" id="controls">
        <div class="control-group">
            <label>Van (Datum/Tijd):</label>
            <input type="datetime-local" id="startDate">
        </div>
        <div class="control-group">
            <label>Tot (Datum/Tijd):</label>
            <input type="datetime-local" id="endDate">
        </div>
        <div class="control-group">
            <label>Snelkoppeling:</label>
            <select id="quickSelect">
                <option value="custom">Handmatig bereik</option>
                <option value="24h">Laatste 24 uur</option>
                <option value="7d">Laatste 7 dagen</option>
                <option value="all">Volledig bestand</option>
            </select>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="windChart"></canvas>
    </div>
    <div class="chart-container-dir">
        <canvas id="dirChart"></canvas>
    </div>
    <div class="hint" id="hint" style="display:none;">
        Scroll om te zoomen • Klik en sleep om te pannen • Beweeg over de lijn voor details
        <button id="resetZoomBtn" style="margin-left:10px; background:none; border:1px solid #ccc; border-radius:5px; padding:2px 8px; font-size:0.75rem; color:#555; cursor:pointer;">Reset zoom</button>
    </div>
</div>

<script>
    let allData = [];
    let myChart = null;
    let myDirChart = null;
    let firstLoadDone = false;
    let maxObservedSpeed = 20; // valt terug op 20 kts tot de eerste dataset binnen is

    // Eén verticaal canvasverloop voor de vulling onder de windkracht-lijn, geïnspireerd op de
    // meerkleurige schaal van Windy: paarsblauw (extreem weinig wind) via blauw, cyaan, groen, geel,
    // oranje, rood, naar roze/donkerpaars (extreem veel wind). Wordt één keer per render opgebouwd
    // (niet per datapunt), en is geankerd aan een vaste waarde i.p.v. de actuele y-as-schaal, dus het
    // verloop blijft betekenisvol ongeacht waarop je bent ingezoomd.
    function getSpeedFillGradient(chart) {
        const { ctx, chartArea, scales } = chart;
        if (!chartArea) return 'rgba(37, 99, 235, 0.4)';

        const yScale = scales.y;
        const yZero = yScale.getPixelForValue(0);
        const yMax = yScale.getPixelForValue(maxObservedSpeed > 0 ? maxObservedSpeed : 1);

        if (yZero === yMax) return 'rgba(37, 99, 235, 0.4)';

        const gradient = ctx.createLinearGradient(0, yZero, 0, yMax);
        const alpha = 0.6;
        gradient.addColorStop(0.00, `rgba(76, 29, 149, ${alpha})`);   // paarsblauw - extreem weinig wind
        gradient.addColorStop(0.16, `rgba(37, 99, 235, ${alpha})`);   // blauw
        gradient.addColorStop(0.32, `rgba(6, 182, 212, ${alpha})`);   // cyaan
        gradient.addColorStop(0.48, `rgba(34, 197, 94, ${alpha})`);   // groen
        gradient.addColorStop(0.62, `rgba(234, 179, 8, ${alpha})`);   // geel
        gradient.addColorStop(0.76, `rgba(249, 115, 22, ${alpha})`);  // oranje
        gradient.addColorStop(0.88, `rgba(220, 38, 38, ${alpha})`);   // rood
        gradient.addColorStop(1.00, `rgba(157, 23, 77, ${alpha})`);   // roze/donkerpaars - extreem veel wind
        return gradient;
    }

    const COMPASS_POINTS = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW', 'N'];
    function compassLabel(deg) {
        return COMPASS_POINTS[Math.round(deg / 45)];
    }

    // Subtiele verticale lijn op het geselecteerde tijdstip
    const crosshairPlugin = {
        id: 'crosshair',
        afterDraw(chart) {
            const active = chart.tooltip && chart.tooltip.getActiveElements ? chart.tooltip.getActiveElements() : [];
            if (!active || !active.length) return;
            const x = active[0].element.x;
            const { top, bottom } = chart.chartArea;
            const ctx = chart.ctx;
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(x, top);
            ctx.lineTo(x, bottom);
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(0,0,0,0.25)';
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.restore();
        }
    };
    Chart.register(crosshairPlugin);

    // Standaard tooltip-styling: subtieler/transparanter dan de Chart.js default
    const SUBTLE_TOOLTIP = {
        backgroundColor: 'rgba(25, 25, 25, 0.72)',
        titleColor: '#ffffff',
        bodyColor: '#ffffff',
        padding: 8,
        cornerRadius: 6
    };

    // Houdt zoom/pan van beide grafieken gelijk
    function syncZoomPan(sourceChart) {
        const targetChart = sourceChart === myChart ? myDirChart : myChart;
        if (!targetChart) return;
        const xScale = sourceChart.scales.x;
        targetChart.options.scales.x.min = xScale.min;
        targetChart.options.scales.x.max = xScale.max;
        targetChart.update('none');
    }

    // Houdt cursor/tooltip/crosshair van beide grafieken gelijk bij hoveren, klikken of aanraken
    function syncHoverFromElements(sourceChart, activeElements) {
        const targetChart = sourceChart === myChart ? myDirChart : myChart;
        if (!targetChart || !activeElements.length) return;
        const idx = activeElements[0].index;
        const activeTarget = targetChart.data.datasets.map((_, dsIndex) => ({ datasetIndex: dsIndex, index: idx }));
        targetChart.setActiveElements(activeTarget);
        targetChart.tooltip.setActiveElements(activeTarget, { x: 0, y: 0 });
        targetChart.update('none');
    }

    document.getElementById('resetZoomBtn').addEventListener('click', () => {
        if (myChart) myChart.resetZoom();
        if (myDirChart) myDirChart.resetZoom();
    });
    let currentQuickSelect = '24h';

    const NOAA_URL = 'https://www.ndbc.noaa.gov/data/realtime2/AGXC1.txt';
    // Fallback CORS-proxy voor het geval NOAA geen CORS-headers stuurt
    const CORS_PROXY = 'https://corsproxy.io/?url=';

    // 1. LIVE DATA OPHALEN
    async function fetchLiveData() {
        const statusEl = document.getElementById('file-status');
        const errorBox = document.getElementById('error-box');
        const loadingText = document.getElementById('loading-text');
        errorBox.style.display = 'none';

        if (!firstLoadDone) {
            document.getElementById('upload-box').style.display = 'block';
            loadingText.innerText = 'Live data laden van NOAA...';
        }
        statusEl.innerText = 'Bezig met verversen...';

        let text = null;
        try {
            const res = await fetch(NOAA_URL, { cache: 'no-store' });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            text = await res.text();
        } catch (directErr) {
            // Directe fetch mislukt (waarschijnlijk CORS) -> probeer via proxy
            try {
                const res2 = await fetch(CORS_PROXY + encodeURIComponent(NOAA_URL), { cache: 'no-store' });
                if (!res2.ok) throw new Error('HTTP ' + res2.status);
                text = await res2.text();
            } catch (proxyErr) {
                statusEl.innerText = '';
                errorBox.style.display = 'block';
                errorBox.innerText = 'Kon geen live data ophalen (geen internetverbinding of NOAA/proxy tijdelijk onbereikbaar). Probeer het zo opnieuw.';
                if (!firstLoadDone) loadingText.innerText = 'Laden mislukt.';
                return;
            }
        }

        parseData(text);
        if (allData.length === 0) {
            statusEl.innerText = '';
            errorBox.style.display = 'block';
            errorBox.innerText = 'Data ontvangen, maar kon deze niet lezen (onverwacht formaat).';
            return;
        }

        if (!firstLoadDone) {
            firstLoadDone = true;
            initUI();
        } else {
            // Data ververst: pas evt. quick-select opnieuw toe, anders blijft handmatige selectie staan
            if (currentQuickSelect !== 'custom') {
                applyQuickSelect(currentQuickSelect);
            } else {
                updateChart();
            }
        }

        const now = moment().tz('America/Los_Angeles').format('DD MMM HH:mm:ss');
        statusEl.innerText = 'Laatst ververst: ' + now + ' (PT)';
    }

    document.getElementById('refreshBtn').addEventListener('click', fetchLiveData);

    // Automatisch elke 5 minuten verversen (NOAA update ~elke 6 min)
    setInterval(fetchLiveData, 5 * 60 * 1000);

    // Start direct bij laden van de pagina
    fetchLiveData();

    function parseData(text) {
        const lines = text.trim().split('\n').slice(2);
        allData = lines.map(line => {
            const c = line.trim().split(/\s+/);
            if (c.length < 8) return null;

            // UTC Tijd naar Moment object
            const mTime = moment.tz(`${c[0]}-${c[1]}-${c[2]} ${c[3]}:${c[4]}`, "YYYY-MM-DD HH:mm", "UTC");
            const laTime = mTime.clone().tz("America/Los_Angeles");

            return {
                t: laTime,
                wdir: isNaN(parseFloat(c[5])) ? null : parseFloat(c[5]),
                wspd: isNaN(parseFloat(c[6])) ? null : parseFloat(c[6]) * 1.94384,
                gst: isNaN(parseFloat(c[7])) ? null : parseFloat(c[7]) * 1.94384
            };
        }).filter(d => d !== null && d.wspd !== null);

        // Sorteer van oud naar nieuw voor de grafiek
        allData.sort((a, b) => a.t - b.t);

        // Vaste referentie voor de kleurschaal: het hoogst gemeten windsnelheid in de hele dataset,
        // onafhankelijk van welk tijdvak je nu bekijkt.
        if (allData.length > 0) {
            maxObservedSpeed = allData.reduce((max, d) => Math.max(max, d.wspd), 0);
        }
    }

    function initUI() {
        document.getElementById('upload-box').style.display = 'none';
        document.getElementById('controls').style.display = 'grid';
        document.getElementById('dashboard').style.display = 'grid';
        document.getElementById('hint').style.display = 'block';

        // Zet standaard datums (laatste 24 uur)
        applyQuickSelect('24h');
    }

    // 2. EVENT LISTENERS VOOR FILTERS
    document.getElementById('startDate').addEventListener('change', function() {
        currentQuickSelect = 'custom';
        document.getElementById('quickSelect').value = 'custom';
        updateChart();
    });
    document.getElementById('endDate').addEventListener('change', function() {
        currentQuickSelect = 'custom';
        document.getElementById('quickSelect').value = 'custom';
        updateChart();
    });
    document.getElementById('quickSelect').addEventListener('change', function() {
        applyQuickSelect(this.value);
    });

    function applyQuickSelect(val) {
        currentQuickSelect = val;
        document.getElementById('quickSelect').value = val;

        if (val === 'custom' || allData.length === 0) {
            updateChart();
            return;
        }

        const lastDate = allData[allData.length - 1].t;
        let start;

        if (val === '24h') start = moment(lastDate).subtract(24, 'hours');
        else if (val === '7d') start = moment(lastDate).subtract(7, 'days');
        else if (val === 'all') start = allData[0].t;
        else return;

        document.getElementById('startDate').value = start.format('YYYY-MM-DDTHH:mm');
        document.getElementById('endDate').value = lastDate.format('YYYY-MM-DDTHH:mm');
        updateChart();
    }

    // 3. DE GRAFIEK UPDATEN
    function updateChart() {
        const startVal = moment(document.getElementById('startDate').value);
        const endVal = moment(document.getElementById('endDate').value);

        const filtered = allData.filter(d => d.t.isSameOrAfter(startVal) && d.t.isSameOrBefore(endVal));

        if (filtered.length === 0) return;

        // Bereken statistieken
        const speeds = filtered.map(d => d.wspd);
        const maxWind = Math.max(...speeds).toFixed(1);
        const avgWind = (speeds.reduce((a, b) => a + b, 0) / speeds.length).toFixed(1);

        document.getElementById('stat-max').innerText = maxWind;
        document.getElementById('stat-avg').innerText = avgWind;

        const labels = filtered.map(d => d.t.toDate());
        const wspdData = filtered.map(d => d.wspd.toFixed(1));
        const gstData = filtered.map(d => d.gst ? d.gst.toFixed(1) : null);

        if (myChart) myChart.destroy();

        const ctx = document.getElementById('windChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Windsnelheid (Kts)',
                        data: wspdData,
                        borderColor: '#1a73e8',
                        backgroundColor: (context) => getSpeedFillGradient(context.chart),
                        borderWidth: 2,
                        fill: true,
                        pointRadius: 0,
                        tension: 0.2
                    },
                    {
                        label: 'Windstoten (Kts)',
                        data: gstData,
                        borderColor: '#ff9800',
                        borderDash: [5, 5],
                        borderWidth: 1,
                        fill: false,
                        pointRadius: 0,
                        tension: 0.2
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                onHover: (event, elements) => syncHoverFromElements(myChart, elements),
                scales: {
                    x: {
                        type: 'category', // We gebruiken categorie voor de labels
                        ticks: {
                            callback: function(val, index) {
                                // Toon datum alleen bij de eerste tick of bij een nieuwe dag
                                return moment(this.getLabelForValue(val)).format('DD MMM HH:mm');
                            },
                            maxTicksLimit: 12
                        }
                    },
                    y: { beginAtZero: true, title: { display: true, text: 'Knopen (kts)' } }
                },
                plugins: {
                    zoom: {
                        zoom: {
                            wheel: { enabled: true },
                            pinch: { enabled: true },
                            mode: 'x',
                            onZoom: ({ chart }) => syncZoomPan(chart)
                        },
                        pan: {
                            enabled: true,
                            mode: 'x',
                            onPan: ({ chart }) => syncZoomPan(chart)
                        }
                    },
                    tooltip: {
                        ...SUBTLE_TOOLTIP,
                        callbacks: {
                            title: (items) => moment(items[0].label).format('LLLL')
                        }
                    }
                }
            }
        });

        // 4. WINDRICHTING GRAFIEK
        const dirData = filtered.map(d => d.wdir);

        if (myDirChart) myDirChart.destroy();

        const dctx = document.getElementById('dirChart').getContext('2d');
        myDirChart = new Chart(dctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Windrichting',
                        data: dirData,
                        borderColor: '#00897b',
                        backgroundColor: 'rgba(0, 137, 123, 0.08)',
                        borderWidth: 2,
                        fill: false,
                        pointRadius: 0,
                        tension: 0,
                        spanGaps: false,
                        // Geen verbindingslijn tekenen als de richting door Noord springt (bv. 350° -> 10°)
                        segment: {
                            borderColor: (ctx) => {
                                const y0 = ctx.p0.parsed.y, y1 = ctx.p1.parsed.y;
                                if (y0 === null || y1 === null) return undefined;
                                return Math.abs(y1 - y0) > 180 ? 'rgba(0,0,0,0)' : undefined;
                            }
                        }
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                onHover: (event, elements) => syncHoverFromElements(myDirChart, elements),
                scales: {
                    x: {
                        type: 'category',
                        ticks: {
                            callback: function(val, index) {
                                return moment(this.getLabelForValue(val)).format('DD MMM HH:mm');
                            },
                            maxTicksLimit: 12
                        }
                    },
                    y: {
                        min: 0,
                        max: 360,
                        title: { display: true, text: 'Richting' },
                        ticks: {
                            stepSize: 45,
                            callback: (val) => compassLabel(val)
                        }
                    }
                },
                plugins: {
                    legend: { display: false },
                    zoom: {
                        zoom: {
                            wheel: { enabled: true },
                            pinch: { enabled: true },
                            mode: 'x',
                            onZoom: ({ chart }) => syncZoomPan(chart)
                        },
                        pan: {
                            enabled: true,
                            mode: 'x',
                            onPan: ({ chart }) => syncZoomPan(chart)
                        }
                    },
                    tooltip: {
                        ...SUBTLE_TOOLTIP,
                        callbacks: {
                            title: (items) => moment(items[0].label).format('LLLL'),
                            label: (item) => item.raw === null ? 'Windrichting: onbekend' : `Windrichting: ${item.raw}° (${compassLabel(item.raw)})`
                        }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
