<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <title>AGXC1 Wind Monitor - Angel Island</title>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.43/moment-timezone-with-data.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px; margin-bottom: 20px; }
        h1 { margin: 0; color: #1a73e8; font-size: 1.5rem; }
        #status-msg { font-size: 0.85rem; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .loading { background: #e8f0fe; color: #1a73e8; }
        .error { background: #fce8e6; color: #d93025; border: 1px solid #fad2cf; }
        .chart-container { position: relative; height: 500px; width: 100%; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #f8f9fa; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #eee; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #1a73e8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>AGXC1 Wind Monitor</h1>
        <button id="refreshBtn" style="padding: 8px 15px; cursor: pointer;">Ververs data</button>
    </div>

    <div id="status-msg" class="loading">Data ophalen van NOAA...</div>

    <div class="stats" id="stats-area" style="display:none;">
        <div class="stat-card">
            <div>Max Wind</div>
            <div id="max-wind" class="stat-value">-</div>
            <div style="font-size: 0.8rem; color: #666;">Knopen (Kts)</div>
        </div>
        <div class="stat-card">
            <div>Gemiddelde</div>
            <div id="avg-wind" class="stat-value">-</div>
            <div style="font-size: 0.8rem; color: #666;">Knopen (Kts)</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="windChart"></canvas>
    </div>
</div>

<script>
    let myChart = null;

    async function fetchData() {
        const statusEl = document.getElementById('status-msg');
        statusEl.className = 'loading';
        statusEl.innerText = 'Bezig met ophalen via proxy...';

        // We gebruiken corsproxy.io met een timestamp om caching te voorkomen
        const targetUrl = 'https://www.ndbc.noaa.gov/data/realtime2/AGXC1.txt';
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl + '?t=' + Date.now())}`;

        try {
            const response = await fetch(proxyUrl);
            
            if (!response.ok) throw new Error(`Proxy gaf foutmelding: ${response.status}`);
            
            const text = await response.text();
            
            if (!text || text.length < 100) throw new Error('Ontvangen data is leeg of corrupt');

            processData(text);

            statusEl.style.display = 'none';
            document.getElementById('stats-area').style.display = 'grid';

        } catch (err) {
            console.error(err);
            statusEl.className = 'error';
            statusEl.innerText = `Fout: ${err.message}. De NOAA server is mogelijk tijdelijk onbereikbaar voor de proxy.`;
        }
    }

    function processData(text) {
        const lines = text.trim().split('\n');
        // De eerste twee regels zijn headers
        const dataLines = lines.slice(2);

        const chartData = dataLines.map(line => {
            const cols = line.trim().split(/\s+/);
            if (cols.length < 8) return null;

            // Tijdstip maken (UTC)
            const time = moment.utc(`${cols[0]}-${cols[1]}-${cols[2]} ${cols[3]}:${cols[4]}`, "YYYY-MM-DD HH:mm");
            // Omzetten naar Pacific Time (Angel Island)
            const localTime = time.tz("America/Los_Angeles");

            // WSPD (kolom 6) en GST (kolom 7) zijn in m/s. Omzetten naar Knopen (* 1.94384)
            const wspd = parseFloat(cols[6]);
            const gst = parseFloat(cols[7]);

            return {
                x: localTime.toDate(),
                y: (isNaN(wspd) || wspd > 90) ? null : wspd * 1.94384,
                gust: (isNaN(gst) || gst > 90) ? null : gst * 1.94384
            };
        }).filter(d => d !== null && d.y !== null).reverse(); // Reverse om chronologisch te maken

        updateStats(chartData);
        renderChart(chartData);
    }

    function updateStats(data) {
        const values = data.map(d => d.y);
        const max = Math.max(...values);
        const avg = values.reduce((a, b) => a + b, 0) / values.length;

        document.getElementById('max-wind').innerText = max.toFixed(1);
        document.getElementById('avg-wind').innerText = avg.toFixed(1);
    }

    function renderChart(data) {
        const ctx = document.getElementById('windChart').getContext('2d');
        
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [{
                    label: 'Windsnelheid (Kts)',
                    data: data,
                    borderColor: '#1a73e8',
                    backgroundColor: 'rgba(26, 115, 232, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: 'hour', displayFormats: { hour: 'HH:mm' } },
                        title: { display: true, text: 'Tijd (Pacific Time)' }
                    },
                    y: { 
                        beginAtZero: true,
                        title: { display: true, text: 'Knopen' }
                    }
                },
                plugins: {
                    tooltip: { mode: 'index', intersect: false }
                }
            }
        });
    }

    document.getElementById('refreshBtn').addEventListener('click', fetchData);
    
    // Start de eerste keer
    fetchData();
</script>

</body>
</html>
